<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; overflow: hidden; }
      body { touch-action: none; }
    </style>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets0.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="modelo"
          src="./modcarro.glb"
          position="0 0 0"
          rotation="0 0 0"
          scale="5 5 5"
          gesture-controls
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent("gesture-controls", {
        schema: {
          minScale: { default: 0.8 },
          maxScale: { default: 15.0 },
          rotateSpeed: { default: 0.008 },

          tapaName: { default: "tapa_v31" },
          tapaMin: { default: 0 },
          tapaMax: { default: 180 },
          tapaSpeed: { default: 0.5 }
        },

        init: function () {
          this.pointers = new Map();

          this.isPinching = false;
          this.isRotating = false;

          this.prevX = 0;
          this.prevY = 0;

          this.startDist = 0;
          this.startScale = 1;

          this.tapa = null;
          this.tapaAngle = 0;

          this.el.addEventListener("model-loaded", () => {
            this.tapa = this.el.object3D.getObjectByName(this.data.tapaName);

            if (this.tapa) {
              console.log("✅ tapa encontrada:", this.data.tapaName);
            } else {
              console.warn("❌ tapa no encontrada");
            }
          });

          window.addEventListener("pointerdown", this.onDown.bind(this));
          window.addEventListener("pointermove", this.onMove.bind(this));
          window.addEventListener("pointerup", this.onUp.bind(this));
          window.addEventListener("pointercancel", this.onUp.bind(this));
        },

        clamp(v, min, max) {
          return Math.max(min, Math.min(max, v));
        },

        distance(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y);
        },

        onDown(e) {
          if (e.pointerType !== "touch") return;

          this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (this.pointers.size === 2) {
            this.isPinching = true;
            this.isRotating = false;

            const pts = Array.from(this.pointers.values());
            this.startDist = this.distance(pts[0], pts[1]);
            this.startScale = this.el.object3D.scale.x;
          }

          if (this.pointers.size === 1) {
            this.isRotating = true;
            this.prevX = e.clientX;
            this.prevY = e.clientY;
          }
        },

        onMove(e) {
          if (!this.pointers.has(e.pointerId)) return;

          this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          // ZOOM
          if (this.isPinching && this.pointers.size === 2) {
            const pts = Array.from(this.pointers.values());
            const dist = this.distance(pts[0], pts[1]);

            const ratio = dist / this.startDist;
            let newScale = this.clamp(this.startScale * ratio, this.data.minScale, this.data.maxScale);

            this.el.object3D.scale.set(newScale, newScale, newScale);
            return;
          }

          if (this.pointers.size === 1) {
            const dx = e.clientX - this.prevX;
            const dy = e.clientY - this.prevY;

            this.prevX = e.clientX;
            this.prevY = e.clientY;

            // 👉 decidir gesto dominante
            if (Math.abs(dx) > Math.abs(dy)) {
              // ROTACIÓN HORIZONTAL
              this.el.object3D.rotation.y += dx * this.data.rotateSpeed;
            } else if (this.tapa) {
              // 👉 CONTROL DE TAPA
              this.tapaAngle -= dy * this.data.tapaSpeed;
              this.tapaAngle = this.clamp(this.tapaAngle, this.data.tapaMin, this.data.tapaMax);

              this.tapa.rotation.x = -THREE.MathUtils.degToRad(this.tapaAngle);
            }
          }
        },

        onUp(e) {
          this.pointers.delete(e.pointerId);
          this.isPinching = false;
          this.isRotating = false;
        }
      });
    </script>
  </body>
</html>
